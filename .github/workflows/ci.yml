name: CI
on:
  workflow_dispatch:
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  lint:
    uses: ./.github/workflows/_lint.yml
  build:
    needs: lint
    uses: ./.github/workflows/_build_wheel.yml
  unit:
    needs: build
    uses: ./.github/workflows/_unit_test.yml
