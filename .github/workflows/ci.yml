name: CI
on:
  pull_request:
    branches: [main]
  workflow_dispatch:
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  lint:
    uses: ./.github/workflows/_lint.yml
  build:
    needs: lint
    uses: ./.github/workflows/_build_wheel.yml
  unit:
    needs: build
    uses: ./.github/workflows/_unit_test.yml
  discover:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      platforms: ${{ steps.detect.outputs.platforms }}
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            .github/configs
            .github/scripts
      - name: Install PyYAML
        run: pip install pyyaml
      - id: detect
        run: python3 .github/scripts/detect_platforms.py
  test-cuda:
    needs: discover
    if: contains(fromJson(needs.discover.outputs.platforms), 'cuda')
    uses: ./.github/workflows/_platform_test.yml
    with:
      platform: cuda
    secrets: inherit
