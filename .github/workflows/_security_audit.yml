name: Security Audit

on:
  workflow_call:
    secrets:
      ANTHROPIC_API_KEY:
        description: "API key for LLM audit layer (optional; layer skipped if not provided)"
        required: false
      ANTHROPIC_BASE_URL:
        description: "Custom API base URL (optional; defaults to https://api.anthropic.com)"
        required: false
      SECURITY_AUDIT_MODEL:
        description: "Model to use for LLM audit (optional; defaults to claude-sonnet-4-20250514)"
        required: false

jobs:
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (attempt 1)
        id: checkout1
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        continue-on-error: true
      - name: Checkout (attempt 2)
        id: checkout2
        if: steps.checkout1.outcome == 'failure'
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        continue-on-error: true
      - name: Checkout (attempt 3)
        if: steps.checkout2.outcome == 'failure'
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Run security audit
        env:
          GH_TOKEN: ${{ github.token }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
          SECURITY_AUDIT_MODEL: ${{ secrets.SECURITY_AUDIT_MODEL }}
        run: python3 .github/scripts/security_audit.py
