# Per-platform test workflow, invoked by ci.yml via workflow_call (one job per platform).
#
# Main steps:
# 1. setup:      Load platform config and generate test matrices
# 2. unit:       Run unit tests with platform-specific include/exclude patterns
# 3. functional: Run component-level GPU tests (ops, compilation, distributed) — fast
# 4. e2e:        Run end-to-end model tests (inference, serving) — slow, needs model files
# 5. benchmark:  Run benchmark smoke tests (throughput, latency, serve entrypoints)
# 6. notify:     Send Feishu notification with overall platform status
#
# Users can modify test settings in tests/platforms/*.yaml:
# - e2e: Add/remove model test cases in the support lists
# - functional: Adjust include/exclude patterns for component tests
# - unit: Add/remove paths in include and exclude lists
# - tolerance: Adjust numerical comparison tolerance for result validation
# - unsupported_features: Exclude test cases matching specific feature tags
name: Platform Test

on:
  workflow_call:
    inputs:
      platform:
        required: true
        type: string
    secrets:
      FEISHU_APP_ID:
        required: false
      FEISHU_APP_SECRET:
        required: false
      FEISHU_CHAT_ID:
        required: false
      CI_PROXY:
        required: false

jobs:
  setup:
    name: "Setup (${{ inputs.platform }})"
    runs-on: ubuntu-latest
    outputs:
      config: ${{ steps.load.outputs.config }}
      e2e_matrix: ${{ steps.matrix.outputs.e2e }}
    steps:
      - name: Checkout (attempt 1)
        id: checkout1
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
        continue-on-error: true
      - name: Checkout (attempt 2)
        id: checkout2
        if: steps.checkout1.outcome == 'failure'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
        continue-on-error: true
      - name: Checkout (attempt 3)
        if: steps.checkout2.outcome == 'failure'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install CI script dependencies
        run: pip install -r .github/scripts/requirements-ci.txt
      - id: load
        run: python .github/scripts/load_config.py --platform ${{ inputs.platform }}
      - id: changes
        name: Detect changed files (PR only)
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git diff --name-only ${{ github.event.pull_request.base.sha }}...${{ github.sha }} > /tmp/changed_files.txt
            echo "file=/tmp/changed_files.txt" >> "$GITHUB_OUTPUT"
          else
            echo "file=" >> "$GITHUB_OUTPUT"
          fi
      - id: matrix
        run: |
          CHANGED_ARG=""
          if [ -n "${{ steps.changes.outputs.file }}" ]; then
            CHANGED_ARG="--changed-files ${{ steps.changes.outputs.file }}"
          fi
          python .github/scripts/generate_matrix.py \
            --platform ${{ inputs.platform }} \
            $CHANGED_ARG

  unit:
    needs: setup
    uses: ./.github/workflows/_unit_test.yml
    with:
      platform: ${{ inputs.platform }}
      ci_image: ${{ fromJson(needs.setup.outputs.config).ci_image }}
      runner_labels: ${{ toJson(fromJson(needs.setup.outputs.config).runner_labels) }}
      container_options: ${{ fromJson(needs.setup.outputs.config).container_options }}
    secrets:
      CI_PROXY: ${{ secrets.CI_PROXY }}

  functional:
    needs: [setup, unit]
    uses: ./.github/workflows/_functional_test.yml
    with:
      platform: ${{ inputs.platform }}
      ci_image: ${{ fromJson(needs.setup.outputs.config).ci_image }}
      runner_labels: ${{ toJson(fromJson(needs.setup.outputs.config).runner_labels) }}
      container_options: ${{ fromJson(needs.setup.outputs.config).container_options }}
    secrets:
      CI_PROXY: ${{ secrets.CI_PROXY }}

  e2e:
    needs: [setup, functional]
    if: needs.setup.outputs.e2e_matrix != '[]'
    strategy:
      fail-fast: false
      matrix:
        test: ${{ fromJson(needs.setup.outputs.e2e_matrix) }}
    uses: ./.github/workflows/_e2e_test.yml
    with:
      platform: ${{ inputs.platform }}
      task: ${{ matrix.test.task }}
      device: ${{ matrix.test.device }}
      cases: ${{ matrix.test.cases }}
      ci_image: ${{ fromJson(needs.setup.outputs.config).ci_image }}
      runner_labels: ${{ toJson(fromJson(needs.setup.outputs.config).runner_labels) }}
      container_options: ${{ fromJson(needs.setup.outputs.config).container_options }}
      timeout: ${{ matrix.test.timeout || 60 }}
    secrets:
      CI_PROXY: ${{ secrets.CI_PROXY }}

  benchmark:
    needs: [setup, e2e]
    uses: ./.github/workflows/_benchmark_test.yml
    with:
      platform: ${{ inputs.platform }}
      ci_image: ${{ fromJson(needs.setup.outputs.config).ci_image }}
      runner_labels: ${{ toJson(fromJson(needs.setup.outputs.config).runner_labels) }}
      container_options: ${{ fromJson(needs.setup.outputs.config).container_options }}
      timeout: 30
    secrets:
      CI_PROXY: ${{ secrets.CI_PROXY }}

  notify:
    needs: [unit, functional, e2e, benchmark]
    if: always()
    uses: ./.github/workflows/_notify_feishu.yml
    with:
      platform: ${{ inputs.platform }}
      status: >-
        ${{ (needs.unit.result == 'success' &&
             needs.functional.result == 'success' &&
             (needs.e2e.result == 'success' || needs.e2e.result == 'skipped') &&
             (needs.benchmark.result == 'success' || needs.benchmark.result == 'skipped'))
            && 'success'
            || (needs.unit.result == 'cancelled' ||
                needs.functional.result == 'cancelled' ||
                needs.e2e.result == 'cancelled' ||
                needs.benchmark.result == 'cancelled')
               && 'cancelled'
               || 'failure' }}
    secrets:
      FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
      FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
      FEISHU_CHAT_ID: ${{ secrets.FEISHU_CHAT_ID }}
